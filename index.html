<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radio Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: 'Montserrat', sans-serif;
}

/* THEME (FLIPPED CORRECTLY) */
body.dark { color: #000; }
body.light { color: #fff; }

/* PLAYER */
.player {
  position: relative;
  width: 100%;
  max-width: 1200px;
  margin: 40px auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 50px 60px;
  border-radius: 30px;
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.2);
}

/* GLASS */
body.dark .player { background: rgba(255,255,255,0.6); }
body.light .player { background: rgba(0,0,0,0.35); }

/* TEXT */
.track { font-size: 48px; font-weight: 800; }
.artist { font-size: 20px; opacity: 0.85; }

/* BUTTON */
.play-btn {
  padding: 14px 32px;
  border-radius: 999px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

/* BUTTON THEMES */
body.dark .play-btn { background:#000; color:#fff; }
body.light .play-btn { background:#fff; color:#000; }

/* ROW */
.play-row {
  display: flex;
  align-items: center;
  gap: 15px;
}

/* MUTE BUTTON */
.mute-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

body.dark .mute-btn { background:#000; color:#fff; }
body.light .mute-btn { background:#fff; color:#000; }

/* SLIDER */
.volume input {
  width: 140px;
  appearance: none;
  height: 6px;
  border-radius: 10px;
  outline: none;
  cursor: pointer;
}

/* TRACK BG */
body.dark .volume input {
  background: rgba(0,0,0,0.2);
}
body.light .volume input {
  background: rgba(255,255,255,0.3);
}

/* THUMB */
.volume input::-webkit-slider-thumb {
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: currentColor;
}

.volume input::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: currentColor;
}

/* RIPPLE */
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  animation: ripple 0.6s linear;
  pointer-events: none;
}

body.dark .ripple { background: rgba(0,0,0,0.2); }
body.light .ripple { background: rgba(255,255,255,0.3); }

@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}

/* ARTWORK */
.cover {
  width: 340px;
  height: 340px;
  border-radius: 18px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
}

/* POWERED */
.powered-by {
  position: absolute;
  bottom: 10px;
  right: 20px;
  font-size: 12px;
}

.powered-by a {
  color: currentColor;
  text-decoration: underline;
}

</style>
</head>

<body>

<div class="player">

  <div>
    <div id="track" class="track">Loading...</div>
    <div id="artist" class="artist">Please wait</div>

    <div class="play-row">
      <button id="playBtn" class="play-btn">Play</button>

      <button id="muteBtn" class="mute-btn">🔊</button>

      <div class="volume">
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="1">
      </div>
    </div>
  </div>

  <div id="cover" class="cover"></div>

  <div class="powered-by">
    <a href="https://myradionest.com" target="_blank">Powered By Radio Nest</a>
  </div>

</div>

<audio id="audio"></audio>

<script>
const params = new URLSearchParams(window.location.search);

const streamURL = params.get("stream");
const metaURL = params.get("meta");
const theme = params.get("theme") || "dark";

document.body.classList.add(theme);

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const muteBtn = document.getElementById("muteBtn");
const volumeSlider = document.getElementById("volumeSlider");

audio.src = streamURL;
audio.volume = 1;

/* PLAY */
playBtn.onclick = (e) => {
  ripple(e, playBtn);

  if (audio.paused) {
    audio.play();
    playBtn.textContent = "Stop";
  } else {
    audio.pause();
    playBtn.textContent = "Play";
  }
};

/* MUTE */
muteBtn.onclick = () => {
  audio.muted = !audio.muted;
  muteBtn.textContent = audio.muted ? "🔇" : "🔊";
};

/* VOLUME */
volumeSlider.addEventListener("input", () => {
  audio.volume = volumeSlider.value;
  updateSlider();
});

/* ANIMATE SLIDER */
function updateSlider() {
  const percent = volumeSlider.value * 100;
  volumeSlider.style.background =
    `linear-gradient(to right, currentColor ${percent}%, rgba(255,255,255,0.2) ${percent}%)`;
}

updateSlider();

/* RIPPLE */
function ripple(e, el) {
  const span = document.createElement("span");
  span.className = "ripple";

  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);

  span.style.width = span.style.height = size + "px";
  span.style.left = (e.clientX - rect.left - size / 2) + "px";
  span.style.top = (e.clientY - rect.top - size / 2) + "px";

  el.appendChild(span);
  setTimeout(() => span.remove(), 600);
}

/* FALLBACK */
const FALLBACK = "https://i.ibb.co/8DwvZS9Z/ON-AIR-Fallback-Album-Art.png";
document.getElementById("cover").style.backgroundImage = `url(${FALLBACK})`;

/* METADATA */
async function fetchMeta() {
  try {
    const res = await fetch(metaURL);
    const data = await res.json();
    const song = data.icestats.source.title || "";

    let [artist, track] = song.split(" - ");

    document.getElementById("track").textContent = track || song;
    document.getElementById("artist").textContent = artist || "";

  } catch {}
}

fetchMeta();
setInterval(fetchMeta, 10000);

</script>

</body>
</html>
