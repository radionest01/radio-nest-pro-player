<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radio Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* GLASS PLAYER */
  .player {
    width: 100%;
    max-width: 1000px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 30px;

    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  }

  body.dark .player {
    background: rgba(0, 0, 0, 0.25);
    color: #fff;
  }

  body.light .player {
    color: #000;
  }

  /* LEFT CONTENT */
  .content {
    flex: 1;
    max-width: 600px;
  }

  .logo img {
    max-height: 70px;
  }

  .logo {
    margin-bottom: 25px;
  }

  .on-air {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 5px;
  }

  .track {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 5px;
  }

  .artist {
    font-size: 16px;
    opacity: 0.8;
    margin-bottom: 20px;
  }

  /* PLAY BUTTON */
  .play-row {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .play-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid currentColor;
    cursor: pointer;
    position: relative;
  }

  .play-btn::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-40%, -50%);
    border-left: 14px solid currentColor;
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
  }

  .playing::before {
    border: none;
    width: 10px;
    height: 16px;
    background: currentColor;
    box-shadow: 6px 0 0 currentColor;
    transform: translate(-50%, -50%);
  }

  .showtime {
    font-size: 14px;
    opacity: 0.7;
  }

  /* RIGHT ARTWORK */
  .cover {
    width: 240px;
    height: 240px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    position: relative;
    flex-shrink: 0;
  }

  .cover-info {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: #fff;
    font-size: 13px;
  }

  .error {
    color: red;
    font-size: 18px;
  }

  /* MOBILE */
  @media (max-width: 700px) {
    .player {
      flex-direction: column;
      text-align: center;
    }

    .cover {
      margin-top: 20px;
    }
  }
</style>
</head>

<body>

<div class="player">

  <!-- LEFT -->
  <div class="content">
    <div class="logo" id="logoContainer">Radio Player</div>

    <div class="on-air">ON AIR NOW</div>
    <div class="track" id="track">Loading...</div>
    <div class="artist" id="artist">Please wait</div>

    <div class="play-row">
      <div id="playBtn" class="play-btn"></div>
      <div class="showtime">Live Stream</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="cover" id="cover">
    <div class="cover-info">
      <div id="coverTrack"></div>
      <div id="coverArtist"></div>
    </div>
  </div>

</div>

<audio id="audio"></audio>

<script>
const params = new URLSearchParams(window.location.search);

const streamURL = params.get("stream");
const metaURL = params.get("meta");
const licenseKey = params.get("license");
const logoURL = params.get("logo");
const theme = params.get("theme") || "light";

/* THEME */
document.body.classList.add(theme);

/* LOGO */
const logoContainer = document.getElementById("logoContainer");
if (logoURL) {
  logoContainer.innerHTML = `<img src="${logoURL}" alt="Logo">`;
}

/* AUDIO */
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");

audio.src = streamURL;

playBtn.onclick = () => {
  if (audio.paused) {
    audio.play();
    playBtn.classList.add("playing");
  } else {
    audio.pause();
    playBtn.classList.remove("playing");
  }
};

/* LICENSE */
async function validateLicense(key) {
  try {
    const res = await fetch("licenses.json");
    const data = await res.json();

    const license = data.licenses.find(l => l.key === key);
    if (!license) return false;

    return new Date() <= new Date(license.expires);
  } catch {
    return false;
  }
}

/* METADATA */
let lastSong = "";

async function fetchMetadata() {
  try {
    const res = await fetch(metaURL);
    const data = await res.json();

    const song = data.icestats.source.title || "";
    if (!song || song === lastSong) return;

    lastSong = song;

    let artist = "";
    let track = song;

    if (song.includes(" - ")) {
      [artist, track] = song.split(" - ");
    }

    track = track.replace(/\(.*?\)/g, "").trim();

    document.getElementById("track").textContent = track;
    document.getElementById("artist").textContent = artist;
    document.getElementById("coverTrack").textContent = track;
    document.getElementById("coverArtist").textContent = artist;

    fetchArtwork(artist, track);

  } catch {}
}

/* ARTWORK */
async function fetchArtwork(artist, track) {
  try {
    const query = encodeURIComponent(`${artist} ${track}`);
    const url = `https://itunes.apple.com/search?term=${query}&entity=song&limit=1`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.results.length > 0) {
      let artwork = data.results[0].artworkUrl100;
      artwork = artwork.replace("100x100", "600x600");

      document.getElementById("cover").style.backgroundImage = `url(${artwork})`;
    }
  } catch {}
}

/* INIT */
(async () => {

  if (!streamURL || !metaURL) {
    document.body.innerHTML = "<div class='error'>Missing stream/meta</div>";
    return;
  }

  if (!licenseKey) {
    document.body.innerHTML = "<div class='error'>Missing license</div>";
    return;
  }

  const valid = await validateLicense(licenseKey);

  if (!valid) {
    document.body.innerHTML = "<div class='error'>License invalid/expired</div>";
    return;
  }

  fetchMetadata();
  setInterval(fetchMetadata, 10000);

})();
</script>

</body>
</html>
