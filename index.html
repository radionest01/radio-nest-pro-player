<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radio Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: 'Montserrat', sans-serif;
}

/* THEME */
body.dark { color: #fff; }
body.light { color: #000; }

/* PLAYER */
.player {
  position: relative;
  width: 100%;
  max-width: 1200px;
  margin: 40px auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 50px 60px;
  border-radius: 30px;

  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0.05)
  );

  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

/* LEFT */
.content { max-width: 650px; }

.logo img { max-height: 80px; }
.logo { margin-bottom: 35px; }

.on-air { font-size: 14px; opacity: 0.7; margin-bottom: 10px; }

.track { font-size: 48px; font-weight: 800; margin-bottom: 10px; }
.artist { font-size: 20px; opacity: 0.85; margin-bottom: 30px; }

/* PLAY BUTTON */
.play-row {
  display: flex;
  align-items: center;
  gap: 20px;
}

.play-btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 3px solid currentColor;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

/* PLAY ICON */
.play-btn::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-left: 22px solid currentColor;
  border-top: 14px solid transparent;
  border-bottom: 14px solid transparent;
}

/* STOP ICON */
.playing::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 20px;
  height: 20px;
  background: currentColor;
}

/* RIPPLE */
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  background: rgba(255,255,255,0.4);
  animation: ripple-animation 0.6s linear;
  pointer-events: none;
}

@keyframes ripple-animation {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

.showtime { font-size: 18px; opacity: 0.8; }

/* ARTWORK */
.cover {
  width: 340px;
  height: 340px;
  border-radius: 18px;
  background-size: cover;
  background-position: center;
  position: relative;
  overflow: hidden;
}

.cover-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 15px;
  background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
}

/* POWERED BY */
.powered-by {
  position: absolute;
  bottom: 12px;
  right: 20px;
  font-size: 12px;
}

.powered-by a {
  color: currentColor;
  text-decoration: underline;
  opacity: 0.8;
}

/* MOBILE */
@media (max-width: 900px) {
  .player {
    flex-direction: column;
    text-align: center;
    padding: 30px;
  }

  .cover {
    margin-top: 30px;
    width: 260px;
    height: 260px;
  }

  .track { font-size: 32px; }
}
</style>
</head>

<body>

<div class="player">

  <div class="content">
    <div class="logo" id="logoContainer">Radio Player</div>

    <div class="on-air">ON AIR NOW</div>
    <div class="track" id="track">Loading...</div>
    <div class="artist" id="artist">Please wait</div>

    <div class="play-row">
      <div id="playBtn" class="play-btn"></div>
      <div class="showtime">Live Stream</div>
    </div>
  </div>

  <div class="cover" id="cover">
    <div class="cover-info">
      <div id="coverTrack"></div>
      <div id="coverArtist"></div>
    </div>
  </div>

  <div class="powered-by">
    <a href="https://myradionest.com" target="_blank">
      Powered By Radio Nest
    </a>
  </div>

</div>

<audio id="audio"></audio>

<script>
const params = new URLSearchParams(window.location.search);

const streamURL = params.get("stream");
const metaURL = params.get("meta");
const logoURL = params.get("logo");
const theme = params.get("theme") || "dark";

document.body.classList.add(theme);

/* LOGO */
if (logoURL) {
  document.getElementById("logoContainer").innerHTML =
    `<img src="${logoURL}" alt="Logo">`;
}

/* AUDIO */
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");

audio.src = streamURL;

/* RIPPLE + PLAY */
playBtn.addEventListener("click", function (e) {

  const ripple = document.createElement("span");
  ripple.classList.add("ripple");

  const rect = playBtn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);

  ripple.style.width = ripple.style.height = size + "px";
  ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
  ripple.style.top = (e.clientY - rect.top - size / 2) + "px";

  playBtn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  if (audio.paused) {
    audio.play();
    playBtn.classList.add("playing");
  } else {
    audio.pause();
    playBtn.classList.remove("playing");
  }
});

/* FALLBACK */
const FALLBACK_ART = "https://i.ibb.co/8DwvZS9Z/ON-AIR-Fallback-Album-Art.png";

function setFallback() {
  document.getElementById("cover").style.backgroundImage = `url(${FALLBACK_ART})`;
}

setFallback();

/* METADATA */
async function fetchMetadata() {
  try {
    const res = await fetch(metaURL);
    const data = await res.json();

    const song = data.icestats.source.title || "";

    let artist = "", track = song;

    if (song.includes(" - ")) {
      [artist, track] = song.split(" - ");
    }

    track = track.replace(/\(.*?\)/g, "").trim();

    document.getElementById("track").textContent = track;
    document.getElementById("artist").textContent = artist;
    document.getElementById("coverTrack").textContent = track;
    document.getElementById("coverArtist").textContent = artist;

    fetchArtwork(artist, track);

  } catch {
    setFallback();
  }
}

/* ARTWORK */
async function fetchArtwork(artist, track) {
  try {
    const query = encodeURIComponent(`${artist} ${track}`);
    const res = await fetch(`https://itunes.apple.com/search?term=${query}&entity=song&limit=5`);
    const data = await res.json();

    if (!data.results.length) return setFallback();

    const match = data.results.find(item =>
      item.artistName.toLowerCase().includes(artist.toLowerCase()) &&
      item.trackName.toLowerCase().includes(track.toLowerCase())
    ) || data.results[0];

    const artwork = match.artworkUrl100.replace("100x100", "600x600");
    document.getElementById("cover").style.backgroundImage = `url(${artwork})`;

  } catch {
    setFallback();
  }
}

fetchMetadata();
setInterval(fetchMetadata, 10000);
</script>

</body>
</html>
