<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radio Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .player {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    gap: 30px;
    padding: 20px;
  }

  /* THEMES */
  body.light { color: #000; }
  body.dark { color: #fff; }

  .left {
    flex: 1;
  }

  .logo img {
    max-height: 60px;
    max-width: 220px;
    object-fit: contain;
  }

  .logo {
    font-size: 26px;
    font-weight: bold;
  }

  .tagline {
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 15px;
  }

  .on-air {
    font-size: 12px;
    opacity: 0.6;
  }

  .show {
    font-size: 34px;
    font-weight: 700;
    margin-top: 5px;
    line-height: 1.2;
  }

  .time {
    font-size: 22px;
    opacity: 0.8;
  }

  .play-btn {
    margin-top: 20px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid currentColor;
    cursor: pointer;
    position: relative;
  }

  .play-btn::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-40%, -50%);
    border-left: 20px solid currentColor;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
  }

  .playing::before {
    border: none;
    width: 18px;
    height: 22px;
    background: currentColor;
    box-shadow: 8px 0 0 currentColor;
    transform: translate(-50%, -50%);
  }

  .cover {
    width: 280px;
    height: 280px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
  }

  .error {
    color: red;
    font-size: 18px;
  }

  /* MOBILE */
  @media (max-width: 700px) {
    .player {
      flex-direction: column;
      text-align: center;
    }

    .cover {
      width: 220px;
      height: 220px;
    }

    .show {
      font-size: 26px;
    }

    .time {
      font-size: 18px;
    }
  }
</style>
</head>

<body>

<div class="player">
  <div class="cover" id="cover"></div>

  <div class="left">
    <div class="logo" id="logoContainer">Radio Player</div>
    <div class="tagline" id="tagline">Live Stream</div>

    <div class="on-air">NOW PLAYING</div>
    <div class="show" id="track">Loading...</div>
    <div class="time" id="artist">Please wait</div>

    <div id="playBtn" class="play-btn"></div>
  </div>
</div>

<audio id="audio"></audio>

<script>
const params = new URLSearchParams(window.location.search);

const streamURL = params.get("stream");
const metaURL = params.get("meta");
const theme = params.get("theme") || "light";
const licenseKey = params.get("license");
const logoURL = params.get("logo");

/* THEME */
document.body.classList.add(theme === "dark" ? "dark" : "light");

/* LOGO */
const logoContainer = document.getElementById("logoContainer");
const tagline = document.getElementById("tagline");

if (logoURL) {
  logoContainer.innerHTML = `<img src="${logoURL}" alt="Station Logo">`;
  tagline.style.display = "none"; // hide "Live Stream"
}

/* AUDIO */
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");

audio.src = streamURL;

playBtn.onclick = () => {
  if (audio.paused) {
    audio.play();
    playBtn.classList.add("playing");
  } else {
    audio.pause();
    playBtn.classList.remove("playing");
  }
};

/* LICENSE */
async function validateLicense(key) {
  try {
    const res = await fetch("licenses.json");
    const data = await res.json();

    const license = data.licenses.find(l => l.key === key);
    if (!license) return false;

    return new Date() <= new Date(license.expires);
  } catch {
    return false;
  }
}

/* METADATA */
let lastSong = "";

async function fetchMetadata() {
  try {
    const res = await fetch(metaURL);
    const data = await res.json();

    const song = data.icestats.source.title || "";
    if (!song || song === lastSong) return;

    lastSong = song;

    let artist = "";
    let track = song;

    if (song.includes(" - ")) {
      [artist, track] = song.split(" - ");
    }

    track = track.replace(/\(.*?\)/g, "").trim();

    document.getElementById("track").textContent = track;
    document.getElementById("artist").textContent = artist;

    fetchArtwork(artist, track);

  } catch {}
}

async function fetchArtwork(artist, track) {
  try {
    const query = encodeURIComponent(`${artist} ${track}`);
    const url = `https://itunes.apple.com/search?term=${query}&entity=song&limit=1`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.results.length > 0) {
      let artwork = data.results[0].artworkUrl100;
      artwork = artwork.replace("100x100", "600x600");

      document.getElementById("cover").style.backgroundImage = `url(${artwork})`;
    }

  } catch {}
}

/* INIT */
(async () => {

  if (!streamURL || !metaURL) {
    document.body.innerHTML = "<div class='error'>Missing stream/meta</div>";
    return;
  }

  if (!licenseKey) {
    document.body.innerHTML = "<div class='error'>Missing license</div>";
    return;
  }

  const valid = await validateLicense(licenseKey);

  if (!valid) {
    document.body.innerHTML = "<div class='error'>License invalid/expired</div>";
    return;
  }

  fetchMetadata();
  setInterval(fetchMetadata, 10000);

})();
</script>

</body>
</html>
