<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radio Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: 'Montserrat', sans-serif;
}

/* THEME */
body.dark { color: #000; }
body.light { color: #fff; }

/* PLAYER */
.player {
  position: relative;
  max-width: 1200px;
  margin: 40px auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 50px 60px;
  border-radius: 30px;
  backdrop-filter: blur(25px);
}

body.dark .player { background: rgba(255,255,255,0.6); }
body.light .player { background: rgba(0,0,0,0.35); }

/* LEFT */
.content { max-width: 650px; }

.logo img {
  max-height: 80px;
  margin-bottom: 30px;
}

/* TEXT */
.on-air {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 8px;
}

.track {
  font-size: 48px;
  font-weight: 800;
  margin-bottom: 8px;
}

.artist {
  font-size: 20px;
  opacity: 0.85;
  margin-bottom: 30px;
}

/* CONTROLS */
.play-row {
  display: flex;
  align-items: center;
  gap: 15px;
}

/* BUTTON */
.play-btn {
  padding: 14px 32px;
  border-radius: 999px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

body.dark .play-btn { background:#000; color:#fff; }
body.light .play-btn { background:#fff; color:#000; }

/* MUTE */
.mute-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

body.dark .mute-btn { background:#000; color:#fff; }
body.light .mute-btn { background:#fff; color:#000; }

/* SLIDER */
.volume input {
  width: 140px;
  appearance: none;
  height: 6px;
  border-radius: 10px;
  outline: none;
  cursor: pointer;
}

/* TRACK COLORS */
body.dark .volume input {
  background: rgba(0,0,0,0.2);
}
body.light .volume input {
  background: rgba(255,255,255,0.3);
}

/* 🔴 ALWAYS RED THUMB */
.volume input::-webkit-slider-thumb {
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ff3b3b !important;
}
.volume input::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ff3b3b !important;
}

/* ARTWORK */
.cover {
  width: 340px;
  height: 340px;
  border-radius: 18px;
  background-size: cover;
  background-position: center;
  position: relative;
  overflow: hidden;
}

/* COVER OVERLAY */
.cover-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 15px;
  color: #fff;
  background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
}

/* POWERED */
.powered-by {
  position: absolute;
  bottom: 10px;
  right: 20px;
  font-size: 12px;
}

.powered-by a {
  color: currentColor;
  text-decoration: underline;
}

/* RIPPLE */
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  animation: ripple 0.6s linear;
}

@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}
</style>
</head>

<body>

<div class="player">

  <div class="content">
    <div id="logo" class="logo"></div>

    <div class="on-air">ON AIR NOW</div>
    <div id="track" class="track">Loading...</div>
    <div id="artist" class="artist">Please wait</div>

    <div class="play-row">
      <button id="playBtn" class="play-btn">Play</button>

      <button id="muteBtn" class="mute-btn">
        <svg id="icon-unmuted" viewBox="0 0 24 24" width="20">
          <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3z"/>
        </svg>
        <svg id="icon-muted" viewBox="0 0 24 24" width="20" style="display:none;">
          <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13 0l5 5m0-5l-5 5"/>
        </svg>
      </button>

      <div class="volume">
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="1">
      </div>
    </div>
  </div>

  <div id="cover" class="cover">
    <div class="cover-info">
      <div id="coverTrack"></div>
      <div id="coverArtist"></div>
    </div>
  </div>

  <div class="powered-by">
    <a href="https://myradionest.com" target="_blank">Powered By Radio Nest</a>
  </div>

</div>

<audio id="audio"></audio>

<script>
const params = new URLSearchParams(window.location.search);

const streamURL = params.get("stream");
const metaURL = params.get("meta");
const logoURL = params.get("logo");
const theme = params.get("theme") || "dark";

document.body.classList.add(theme);

/* LOGO */
if (logoURL) {
  document.getElementById("logo").innerHTML = `<img src="${logoURL}">`;
}

/* AUDIO */
const audio = document.getElementById("audio");
audio.src = streamURL;

/* PLAY */
const playBtn = document.getElementById("playBtn");
playBtn.onclick = (e) => {
  ripple(e, playBtn);
  if (audio.paused) {
    audio.play();
    playBtn.textContent = "Stop";
  } else {
    audio.pause();
    playBtn.textContent = "Play";
  }
};

/* MUTE */
const muteBtn = document.getElementById("muteBtn");
const iconMuted = document.getElementById("icon-muted");
const iconUnmuted = document.getElementById("icon-unmuted");

muteBtn.onclick = () => {
  audio.muted = !audio.muted;
  iconMuted.style.display = audio.muted ? "block" : "none";
  iconUnmuted.style.display = audio.muted ? "none" : "block";
};

/* VOLUME */
const volumeSlider = document.getElementById("volumeSlider");

volumeSlider.addEventListener("input", () => {
  audio.volume = volumeSlider.value;
  updateSlider();
});

function updateSlider() {
  const percent = volumeSlider.value * 100;

  if (document.body.classList.contains("dark")) {
    volumeSlider.style.background =
      `linear-gradient(to right, #000 ${percent}%, rgba(0,0,0,0.2) ${percent}%)`;
  } else {
    volumeSlider.style.background =
      `linear-gradient(to right, #fff ${percent}%, rgba(255,255,255,0.3) ${percent}%)`;
  }
}
updateSlider();

/* RIPPLE */
function ripple(e, el) {
  const span = document.createElement("span");
  span.className = "ripple";
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  span.style.width = span.style.height = size + "px";
  span.style.left = (e.clientX - rect.left - size / 2) + "px";
  span.style.top = (e.clientY - rect.top - size / 2) + "px";
  el.appendChild(span);
  setTimeout(() => span.remove(), 600);
}

/* ARTWORK */
const FALLBACK = "https://i.ibb.co/8DwvZS9Z/ON-AIR-Fallback-Album-Art.png";

function setFallback() {
  document.getElementById("cover").style.backgroundImage = `url(${FALLBACK})`;
}

async function fetchArtwork(artist, track) {
  try {
    const query = encodeURIComponent(`${artist} ${track}`);
    const res = await fetch(`https://itunes.apple.com/search?term=${query}&entity=song&limit=5`);
    const data = await res.json();

    if (!data.results.length) return setFallback();

    const match = data.results[0];
    const art = match.artworkUrl100.replace("100x100","600x600");

    document.getElementById("cover").style.backgroundImage = `url(${art})`;

  } catch {
    setFallback();
  }
}

/* METADATA */
async function fetchMeta() {
  try {
    const res = await fetch(metaURL);
    const data = await res.json();

    const song = data.icestats.source.title || "";
    let artist = "", track = song;

    if (song.includes(" - ")) {
      [artist, track] = song.split(" - ");
    }

    track = track.replace(/\(.*?\)/g, "").trim();

    document.getElementById("track").textContent = track;
    document.getElementById("artist").textContent = artist;
    document.getElementById("coverTrack").textContent = track;
    document.getElementById("coverArtist").textContent = artist;

    fetchArtwork(artist, track);

  } catch {
    setFallback();
  }
}

setFallback();
fetchMeta();
setInterval(fetchMeta, 10000);
</script>

</body>
</html>
